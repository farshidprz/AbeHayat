<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="drop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1e3a5f" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Water drop shape -->
  <path
    d="M60 8 C60 8, 22 52, 22 74 C22 95.5 39.5 112 60 112 C80.5 112 98 95.5 98 74 C98 52 60 8 60 8 Z"
    fill="url(#drop)"
    filter="url(#shadow)"
  />

  <!-- Shine on drop -->
  <path
    d="M60 8 C60 8, 22 52, 22 74 C22 95.5 39.5 112 60 112 C80.5 112 98 95.5 98 74 C98 52 60 8 60 8 Z"
    fill="url(#shine)"
  />

  <!-- Wave inside drop -->
  <path
    d="M36 78 Q43 70 50 78 Q57 86 64 78 Q71 70 78 78 Q82 82 84 78"
    stroke="white"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
    opacity="0.6"
  />
  <path
    d="M36 88 Q43 80 50 88 Q57 96 64 88 Q71 80 78 88 Q82 92 84 88"
    stroke="white"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
    opacity="0.3"
  />

  <!-- Cross -->
  <rect x="55" y="38" width="10" height="34" rx="3" fill="url(#cross)"/>
  <rect x="42" y="50" width="36" height="10" rx="3" fill="url(#cross)"/>
</svg>
